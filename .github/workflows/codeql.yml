name: "CodeQL Advanced"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '40 10 * * 3'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        # 1. Si imposta la compilazione C/C++ su "manual"
        - language: c-cpp
          build-mode: manual 
        - language: python
          build-mode: none

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        # 2. Si inserisce il percorso della cartella contenente le query custom
        # Il prefisso "+" aggiunge queste query a quelle standard di sicurezza
        queries: +./custom-queries

    - name: Run manual build steps
      if: matrix.build-mode == 'manual'
      shell: bash
      # 3. Si forniscono le istruzioni reali per compilare U-Boot
      run: |
        echo "Installazione delle dipendenze per U-Boot..."
        sudo apt-get update
        sudo apt-get install -y build-essential bison flex libssl-dev bc libsdl2-dev
        
        echo "Configurazione della board (sandbox per esecuzione nativa)..."
        make sandbox_defconfig
        
        echo "Avvio della compilazione tracciata da CodeQL..."
        make -j$(nproc)

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
